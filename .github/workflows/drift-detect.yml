name: Structured-Data Drift Detection

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override BASE_URL (default: production Netlify)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  drift:
    name: Extract signals & detect drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Run test matrix
        working-directory: tests
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'http://criteo-dynamic-test-shop.s3-website-us-east-1.amazonaws.com' }}
        run: npm test

      - name: Run automapper (drift mode)
        working-directory: tests
        run: npm run drift
        # exit code 1 if critical fields disappeared — still continue to report

      - name: Upload gap report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gap-report-${{ github.run_id }}
          path: |
            tests/automapper/reports/gap-report.json
            tests/automapper/reports/drift-report.json

      - name: Commit updated mappings and baselines
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(automapper): update JQ mappings and drift baselines [skip ci]'
          file_pattern: |
            tests/automapper/mappings/*.json
            tests/automapper/baselines/*.json

      - name: Create issue on critical drift
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const driftPath = 'tests/automapper/reports/drift-report.json';
            let body = '## Structured-data drift detected\n\nThe weekly automapper run found that one or more fields have disappeared from their expected sources.\n\n';
            if (fs.existsSync(driftPath)) {
              const report = JSON.parse(fs.readFileSync(driftPath, 'utf8'));
              const critical = report.events.filter(e => e.type === 'field_disappeared');
              body += '### Critical (field disappeared)\n';
              for (const e of critical) {
                body += `- **${e.variant}** · \`${e.field}\`: was in \`${e.previousSource}\`, now missing\n`;
              }
            }
            body += `\n[Run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[automapper] Drift detected — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['drift', 'automapper'],
            });
